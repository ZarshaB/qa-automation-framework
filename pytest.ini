[pytest]
markers =
    ui: UI tests driven through Selenium
    api: API tests hitting endpoints directly, no browser
    bdd: BDD scenarios written in Gherkin
    smoke: fast, critical-path checks - safe to run on every PR
    regression: full regression suite - run nightly or pre-release

testpaths =
    tests
    api
    step_defs

bdd_features_base_dir = features/
